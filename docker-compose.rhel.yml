# RedTrack v2 — RHEL Enterprise Docker Compose
# Uses Red Hat Hardened Images (registry.redhat.io/hi/)
# Requires: docker login registry.redhat.io
# Usage: docker compose -f docker-compose.rhel.yml up --build -d

version: "3.9"

services:
  db:
    image: registry.redhat.io/hi/postgresql-15:latest
    restart: always
    environment:
      POSTGRESQL_USER: redtrack
      POSTGRESQL_PASSWORD: redtrack_secret
      POSTGRESQL_DATABASE: redtrack
    volumes:
      - postgres_data:/var/lib/pgsql/data:z
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U redtrack"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: registry.redhat.io/hi/redis-7:latest
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.rhel
    restart: always
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./backend:/app:z
      - uploads_data:/app/uploads:z

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.rhel
    restart: always
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src:z

  nginx:
    image: registry.redhat.io/hi/nginx-122:latest
    restart: always
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro,z
      - ./nginx/certs:/etc/nginx/certs:ro,z
    depends_on:
      - backend
      - frontend

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - nginx
    profiles:
      - cloudflare

volumes:
  postgres_data:
  uploads_data:
